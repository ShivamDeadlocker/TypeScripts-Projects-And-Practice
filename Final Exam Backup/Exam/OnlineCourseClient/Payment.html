<html lang="en">

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <!-- Cart Css File Reference -->
    <link rel="stylesheet" href="css/payment.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header>
      <nav>
        <ul>
          <li>
            <a href="Home.html"><i class="fa-solid fa-laptop"></i> InoEdu</a>
          </li>
          <li><a href="Product.html">Products</a></li>
          <li class="instructorOption"><a href="Inventory.html">My Inventory</a></li>

              (<span id="cart-count">0</span>)
            </a>
          </li>
          <li id="auth-section"></li>
        </ul>
      </nav>
    </header>

    <div class="payment-card">
      <h2>Payment Details</h2>

      <label>Card Number</label>
      <input
        type="text"
        id="cardNumber"
        maxlength="16"
        placeholder="Enter 16 digit your debit/credit card number"
      />

      <label>Expiry Date (MM/YY)</label>
      <input type="month" id="expiry" placeholder="MM/YY" />

      <label>CVV</label>
      <input type="password" id="cvv" maxlength="3" placeholder="123" />

      <button id="payment">Pay Now</button>
    </div>

    <footer>
      <div>

      <div>

        <i class="fa-brands fa-square-facebook"></i>
        <i class="fa-brands fa-instagram"></i>
        <i class="fa-brands fa-youtube"></i>
      </div>
    </footer>
    <!-- Required Scripts Files -->

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Loading User Profile, Admin Check, Logout Function, Single Product Data-->
