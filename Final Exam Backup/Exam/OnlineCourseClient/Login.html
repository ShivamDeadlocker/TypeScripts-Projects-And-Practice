<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link rel="stylesheet" href="css/signup-login.css" />
  </head>

  <body>
    <!-- HEADER -->
    <header>
      <nav>
        <ul>
          <li>
            <a href="Home.html"><i class="fa-solid fa-laptop"></i> InoEdu</a>
          </li>
        </ul>
      </nav>
    </header>

    <!-- Login Container -->
    <div class="container">
      <h2>Log in</h2>
      <form id="loginForm">
        <div class="form-group">
          <label>Email:</label>
          <input
            type="email"
            id="email"
            placeholder="Enter Your Email Id"
            required
          />
        </div>

        <div class="form-group">
          <label>Password:</label>
          <input
            type="password"
            id="password"
            placeholder="Enter Your Password"
            required
          />
        </div>
        <button type="submit">Log in</button>
      </form>

      <div class="link">
        Don't have an account? <a href="Signup.html">Signup</a>
      </div>
    </div>

    <!-- Required Scripts For User Auth -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- JS File Generated Using TS File -->
    <script type="module" src="dist/auth/Auth.js"></script>

  </body>
</html>
